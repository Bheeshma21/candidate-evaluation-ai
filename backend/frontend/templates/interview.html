<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>AI Interview</title>

    <link rel="stylesheet" href="/static/style.css">

</head>

<body>

    <div class="container">

        <h1>🎤 AI Interview</h1>

        <input
            id="job"
            type="text"
            value="Python Developer"
            placeholder="Job Role"
        >

        <button onclick="startInterview()">
            Start Interview
        </button>

        <hr>

        <h2>AI Question</h2>

        <div id="question">
            Waiting for interview...
        </div>

        <br>

        <h2>Candidate Answer</h2>

        <div id="answer">
            Waiting for candidate...
        </div>

        <br>

        <h2>Status</h2>

        <div id="status">
            Waiting...
        </div>

    </div>

    <script src="/static/interview.js"></script>

</body>

</html>
